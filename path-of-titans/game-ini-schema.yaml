# ═══════════════════════════════════════════════════════════════
# Path of Titans — Game.ini Configuration Schema
# ═══════════════════════════════════════════════════════════════
# This file defines every setting available in the Game.ini
# visual editor on the NexLink Core Panel. Each entry maps to
# an INI property on the game server.
#
# ───────────────────────────────────────────────────────────────
# Field Legend
# ───────────────────────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property        INI property name (e.g. ServerMap, bServerGrowth=)
#   label           Display name shown in the panel UI
#   type            Input type — one of:
#                     text      Free-text input
#                     number    Numeric input (use min/max/step to constrain)
#                     checkbox  Boolean toggle (true/false)
#                     select    Dropdown menu (requires "options" list)
#   default         Default value when the setting is not explicitly set
#   section         INI file section header
#                     e.g. "[/Script/PathOfTitans.IGameSession]"
#   accordion       UI group name — settings are grouped under this heading
#   accordionOrder  Display order of the group (0 = first group shown)
#   order           Display order within the group (0 = first setting)
#
# OPTIONAL FIELDS:
#   helpText        Help description shown to the user
#   subheader       Sub-group label within an accordion
#   min             Minimum value (number type only)
#   max             Maximum value (number type only)
#   step            Increment step (number type only, e.g. 1 for integers)
#   options         List of allowed values (select type only)
#   repeatable      Can this setting appear multiple times (true/false)
#   fullWidth       Force full-width layout in UI (true/false)
#   dependsOn       Only show this setting when another setting is enabled
#                     e.g. dependsOn: bServerDynamicTimeOfDay
#
# ───────────────────────────────────────────────────────────────
# Sections
# ───────────────────────────────────────────────────────────────
#  1. General Server Settings
#  2. Quest System Settings
#  3. Waystone Settings
#  4. Chat & Communication
#  5. Map & Navigation
#  6. Whitelist & Permissions
#  7. Growth & Survival
#  8. Nesting & Family System
#  9. Death & Respawn
# 10. Critters & Burrows
# 11. Home Cave
# 12. Player Lifecycle & Security
# 13. Character Management
# 14. Weather System
# 15. Water & Environmental Systems
# 16. Network Settings
# ═══════════════════════════════════════════════════════════════


# ═══════════════════════════════════════════════════════════════
# General Server Settings
# ═══════════════════════════════════════════════════════════════
settings:
  - accordion: General Server Settings
    subheader: ""
    property: ServerMap
    label: Server Map
    default: Island
    helptext: The map the server will load with.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 0
    type: select
    options:
      - Island
      - Panjura
      - Riparia
#
#
  - accordion: General Server Settings
    subheader: ""
    property: ServerFootprintLifetime=
    label: Footprint Lifetime
    type: number
    min: 0
    max: 60
    repeatable: false
    default: 60
    helpText: The duration (in seconds) that a server footprint remains active after
      a player leaves.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 0
  - accordion: General Server Settings
    subheader: ""
    property: ReservedSlots=
    label: Reserved Slots
    type: number
    min: 0
    max: 60
    repeatable: false
    default: 20
    helpText: Number of reserved player slots
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 6
    accordionOrder: 0
    fullWidth: false
  - accordion: General Server Settings
    subheader: ""
    property: bServerNameTags=
    label: Name Tags
    type: checkbox
    repeatable: false
    default: ""
    helpText: Enables or disables the ability for ALL players on the server to see
      player nametags.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 7
    accordionOrder: 0
  - accordion: General Server Settings
    subheader: ""
    property: bServerFallDamage=
    label: Fall Damage
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables fall damage for players.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 8
    accordionOrder: 0
    fullWidth: true
  - accordion: General Server Settings
    subheader: ""
    property: bServerAllowAnselMultiplayerPausing=
    label: Allow Ansel Multiplayer Pausing
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the ability to pause the game while using Ansel in
      multiplayer. Be mindful of allowing this, as players can technically use
      it to pause their game to investigate the location of hiding players or
      gain other gameplay advantages.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 9
    accordionOrder: 0
  - accordion: General Server Settings
    subheader: ""
    property: ServerAnselCameraConstraintDistance=
    label: Ansel Camera Constraint Distance
    type: number
    min: 0
    repeatable: false
    default: 500
    helpText: The distance, in centimeters, the player can move their Nvidia Ansel
      camera away from their dinosaur in order to take screenshots. It's
      suggested to keep this a bit limited to avoid unfair gameplay advantages.
      Defaults to `500` (5 meters).
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 10
    accordionOrder: 0
    dependsOn: bServerAllowAnselMultiplayerPausing=
  # --- Time of Day ---
  - accordion: General Server Settings
    subheader: Time of Day
    property: bServerDynamicTimeOfDay=
    label: Dynamic Time of Day
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, the world time cycles automatically between day and night.
    section: "[/Script/PathOfTitans.IGameMode]"
    order: 11
    accordionOrder: 0
    fullWidth: true
  - accordion: General Server Settings
    subheader: Time of Day
    property: ServerDayLength=
    label: Day Length
    type: number
    min: 1
    repeatable: false
    default: 60
    helpText: Length of the daylight period (units as per game config; higher =
      longer days).
    section: "[/Script/PathOfTitans.IGameMode]"
    dependsOn: bServerDynamicTimeOfDay
    order: 12
    accordionOrder: 0
  - accordion: General Server Settings
    subheader: Time of Day
    property: ServerNightLength=
    label: Night Length
    type: number
    min: 1
    repeatable: false
    default: 30
    helpText: Length of the nighttime period (units as per game config; higher =
      longer nights).
    section: "[/Script/PathOfTitans.IGameMode]"
    dependsOn: bServerDynamicTimeOfDay
    order: 13
    accordionOrder: 0
  - accordion: General Server Settings
    subheader: Time of Day
    property: ServerStartingTime=
    label: Server Starting Time
    type: number
    min: 0
    max: 2300
    repeatable: false
    default: 1300
    helpText: Specifies the time of day the server begins at after a restart. Time
      is scaled between 0-2300. Example:100 = 1:00 AM, 1200 = 12:00 PM, and 1800
      = 6:00 PM signifies 12:00 PM, and 1800 denotes 6:00 PM.
    section: "[/Script/PathOfTitans.IGameMode]"
    order: 14
    accordionOrder: 0
  # ═══════════════════════════════════════════════════════════════
  # Quest System Settings (15 settings)
  # ═══════════════════════════════════════════════════════════════
  # --- Quests In Location ---
  - accordion: Quest System Settings
    subheader: Quests In Location
    property: bOverrideMaxCompleteQuestsInLocation=
    label: Override Max Quests in Location
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the ability to change the
      `MaxCompleteQuestsInLocation`. Defaults to `false`. If set to `true` you
      must also set `MaxCompleteQuestsInLocation`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: Quests In Location
    property: MaxCompleteQuestsInLocation=
    label: Max Quests in Location
    type: number
    repeatable: false
    default: 3
    helpText: Determines how many quests must be completed within a POI before it is
      'completed'.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: QuestGrowthMultiplier=
    label: Quest Growth Multiplier
    type: number
    repeatable: false
    default: 1
    helpText: Multiplier for the growth of quest rewards. If you want to disable
      growth from quests, set this value to `0`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: QuestMarksMultiplier=
    label: Quest Marks Multiplier
    type: number
    repeatable: false
    default: 1
    helpText: Specifies the multiplier used when rewarding marks for quest completion.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: bTrophyQuests=
    label: Enable Trophy Quests
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables trophy quests.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 1
  # --- Trophy Quest ---
  - accordion: Quest System Settings
    subheader: Trophy Quest
    property: bOverrideTrophyQuestCooldown=
    label: Override Trophy Quest Cooldown
    type: checkbox
    repeatable: false
    default: false
    helpText: Flags whether you want to override the `Trophy Quest Cooldown`. If set
      to true you must also then specify the `Trophy Quest Cooldown`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: Trophy Quest
    property: TrophyQuestCooldown=
    label: Trophy Quest Cooldown
    type: number
    repeatable: false
    default: 1800
    helpText: Time (in seconds) between a player being able to handin another Trophy
      quest.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 6
    accordionOrder: 1
  # --- Local Quest ---
  - accordion: Quest System Settings
    subheader: Local Quest
    property: bOverrideLocalQuestCooldown=
    label: Override Local Quest Cooldown
    type: checkbox
    repeatable: false
    default: false
    helpText: Flags whether you want to override the `LocalQuestCooldown`. If set to
      true you must also then specify the `LocalQuestCooldown`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 7
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: Local Quest
    property: LocalQuestCooldown=
    label: Local Quest Cooldown
    type: number
    repeatable: false
    default: 3600
    helpText: Time (in seconds) between a player being able to recieve a new Local Quest.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 8
    accordionOrder: 1
  # --- Location Quest ---
  - accordion: Quest System Settings
    subheader: Location Quest
    property: bOverrideLocationQuestCooldown=
    label: Override Location Quest Cooldown
    type: checkbox
    repeatable: false
    default: false
    helpText: Specifies whether to change the time it takes for a Location Quest to
      be given to a player. If set to true you must then set `Location Quest
      Cooldown`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 9
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: Location Quest
    property: LocationQuestCooldown=
    label: Location Quest Cooldown
    type: number
    repeatable: false
    default: 3600
    helpText: Time (in seconds) between a player being able to recieve a new
      Location Quest.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 10
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: MaxGroupQuests=
    label: Max Group Quests
    type: number
    repeatable: false
    default: 2
    helpText: Specifies the maximum number of group quests that can be assigned to a
      group at a time.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 11
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: bServerLocalWorldQuests=
    label: Local World Quests
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables Local World Quests on your server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 12
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: ServerMinTimeBetweenExplorationQuest=
    label: Min Time Between Exploration Quests
    type: number
    repeatable: false
    default: 30
    helpText: Specifies the minimum time (in minutes) between a player receiving a
      new Exploration quest.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 13
    accordionOrder: 1
  - accordion: Quest System Settings
    subheader: ""
    property: bLoseQuestsOnDeath=
    label: Lose Quests On Death
    type: checkbox
    repeatable: false
    default: true
    helpText: Specifies whether quests will automatically fail when a player dies.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 14
    accordionOrder: 1
  # ═══════════════════════════════════════════════════════════════
  # Waystone Settings (4 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Waystone Settings
    subheader: ""
    property: bServerWaystones=
    label: Enable Waystones
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables Waystones on your server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 2
  - accordion: Waystone Settings
    subheader: ""
    property: bServerAllowInGameWaystone=
    label: Allow In-Game Waystone
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables waystones. Setting this as false requires players
      to use the old method of using the Waystone by retuning to the Character
      Menu screen.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 2
  - accordion: Waystone Settings
    subheader: ""
    property: bServerWaystoneCooldownRemoval=
    label: Remove Waystone Cooldown
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the ability for players to spend marks to
      insta-cooldown Waystones.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 2
  - accordion: Waystone Settings
    subheader: ""
    property: OverrideWaystoneCooldown=
    label: Override Waystone Cooldown
    type: number
    min: -1
    repeatable: false
    default: -1
    helpText: Overrides the cooldown timer for Waystones in seconds. -1 will use the
      default cooldown timer.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 2
  # ═══════════════════════════════════════════════════════════════
  # Chat & Communication (3 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Chat & Communication
    subheader: ""
    property: bServerAllowChat=
    label: Allow Chat
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables text chat for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 3
  - accordion: Chat & Communication
    subheader: ""
    property: bServerGlobalChat=
    label: Global Chat
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables global chat for all players on the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 3
  - accordion: Chat & Communication
    subheader: ""
    property: bServerChatWhispers=
    label: Chat Whispers
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables whisper chat for players on the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 3
  # ═══════════════════════════════════════════════════════════════
  # Map & Navigation (7 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Map & Navigation
    subheader: ""
    property: bServerAllowMap=
    label: Allow Map
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the full map for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 4
  - accordion: Map & Navigation
    subheader: ""
    property: bServerAllowMinimap=
    label: Allow Minimap
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the minimap for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 4
  - accordion: Map & Navigation
    subheader: ""
    property: bServerAllow3DMapMarkers=
    label: Allow 3D Map Markers
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the markers on the full map, and floating quest
      markers in the world.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 4
  - accordion: Map & Navigation
    subheader: ""
    property: bServerAllowMapPOINames=
    label: Allow Map POI Names
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the display of Point of Interest names on the map.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 4
  # --- Popular Locations ---
  - accordion: Map & Navigation
    subheader: Popular Locations
    property: bServerShowMapIconPopularLocation=
    label: Show Map Icon for Popular Locations
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables Popular Locations, highlighting areas of the map with a high
      player density.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 4
  - accordion: Map & Navigation
    subheader: Popular Locations
    property: ServerMapIconPopularLocationPlayerCount=
    label: Popular Location Player Count
    type: number
    repeatable: false
    default: 10
    helpText: Allows you to set the number of users required in an area before it's
      highlighted on the map.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 4
  # --- Spawns ---
  - accordion: Map & Navigation
    subheader: Spawns
    property: FurthestSpawnInclusionRadius=
    label: Furthest Spawn Inclusion Radius
    type: number
    min: 0
    repeatable: false
    default: 100000
    helpText: Max radius (game units; e.g., 100000 ≈ 1km) within which spawn points
      are considered for new/respawning players.
    section: "[/Script/PathOfTitans.IGameMode]"
    order: 6
    accordionOrder: 4
  # ═══════════════════════════════════════════════════════════════
  # Whitelist & Permissions (2 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Whitelist & Permissions
    subheader: ""
    property: bEnforceWhitelist=
    label: Enforce Whitelist
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the enforcement of the whitelist. If enabled, only
      players on the whitelist can join the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 5
  - accordion: Whitelist & Permissions
    subheader: ""
    property: bServerPaidUsersOnly=
    label: Paid Users Only
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables access to the server for paid users only.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 5
  # ═══════════════════════════════════════════════════════════════
  # Growth & Survival (17 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Growth & Survival
    subheader: ""
    property: bServerGrowth=
    label: Enable Growth
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the growth system. If disabled, all dinosaurs will
      spawn as Adults, and all existing characters will be bumped up to Adult.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: MinGrowthAfterDeath=
    label: Minimum Growth After Death
    type: number
    min: 0
    max: 1
    repeatable: false
    default: 0.5
    helpText: Sets the minimum growth stage a dinosaur will revert to after death.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: GlobalPassiveGrowthPerMinute=
    label: Global Passive Growth Per Minute
    type: number
    repeatable: false
    default: 0
    helpText: Sets the global passive growth rate for all dinosaurs. use
      (https://guides.gsh-servers.com/path-of-titans/tools/path-of-titans-growth-calculator)
      to calculate appropriate values.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: bLoseGrowthPastGrowthStages=
    label: Lose Growth Past Growth Stages
    type: checkbox
    repeatable: false
    default: true
    helpText: Allows players to lose growth past Juvenile/Adolescent/Sub-Adult/Adult
      growth states when they die.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: ChangeSubspeciesGrowthPenaltyPercent=
    label: Change Subspecies Growth Penalty Percent
    type: number
    repeatable: false
    default: 25
    helpText: Specifies the growth penalty percent for changing subspecies. Note
      that `Lose Growth Past Growth Stages` may have to be active for anything
      25 and above.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: CombatDeathGrowthPenaltyPercent=
    label: Combat Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 10
    helpText: Specifies the growth penalty percent for combat deaths. Note that
      `Lose Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: FallDeathGrowthPenaltyPercent=
    label: Fall Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 2
    helpText: Specifies the growth penalty percent for fall deaths. Note that `Lose
      Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 6
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: SurvivalDeathGrowthPenaltyPercent=
    label: Survival Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 5
    helpText: Specifies the growth penalty percent for survival deaths. Note that
      `Lose Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 7
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: HatchlingCaveExitGrowth=
    label: Hatchling Cave Exit Growth
    type: number
    min: 0
    max: 1
    repeatable: false
    default: 0
    helpText: Specifies the growth a player will have when they exit the Hatchling
      Caves. `0` denotes a hatchling and is the default value.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 8
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: bUseTutorialCustomGrowthMultiplier=
    label: Use Tutorial Custom Growth Multiplier
    type: checkbox
    repeatable: false
    default: false
    helpText: If true, the tutorial will use the `Tutorial Growth Multiplier` value
      to determine the growth rate of the player. If `false`, the tutorial will
      use the default growth rate.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 9
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: TutorialCustomGrowthMultiplier=
    label: Tutorial Growth Multiplier
    type: number
    repeatable: false
    default: 1
    helpText: Specifies the custom growth multiplier for the tutorial.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 10
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: bServerWellRestedBuff=
    label: Server Well Rested Buff
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the Well Rested buff.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 11
    accordionOrder: 6
  - accordion: Growth & Survival
    subheader: ""
    property: bServerFish=
    label: Enable Fish
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables fish spawning.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 12
    accordionOrder: 6
  # --- Grouping Rules ---
  - accordion: Growth & Survival
    subheader: Grouping Rules
    property: bServerRestrictCarnivoreGrouping=
