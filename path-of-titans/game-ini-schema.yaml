    order: 7
    accordionOrder: 10
  # ═══════════════════════════════════════════════════════════════
  # Player Lifecycle & Security (9 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: bServerEditAbilitiesWhileSleeping=
    label: Enable Editing Abilities While Sleeping
    type: checkbox
    repeatable: false
    default: false
    helpText: If `enabled`, players can edit their abilities while sleeping. If
      disabled, players cannot edit their abilities while sleeping. If this is
      `enabled` AND `Enable Editing Abilities in Home Caves`, players can edit
      their abilities in their home caves OR while sleeping.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: bServerHatchlingCaves=
    label: Enable Hatchling Caves
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables/Disables the tutorial Hatchling Caves. If this is enabled,
      players will spawn in a tutorial area at `0` growth, and completing quests
      will bring them to `0.25` growth by the time they exit. If this is
      disabled, players will spawn in the world at `0.25` growth and completely
      skip the tutorial. The growth can be modified with `Hatchling Cave Exit
      Growth`.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: bServerAllowReplayRecording=
    label: Enable Replay Recording
    type: checkbox
    repeatable: false
    default: false
    helpText: If `enabled`, players will be able to record their gameplay and replay
      it later. If disabled, players will not be able to record their gameplay.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: ServerDeadBodyTime=
    label: Dead Body Time
    type: number
    repeatable: false
    default: 0
    helpText: Sets the time (in seconds) that dead bodies will remain in the world
      before despawning. A value of `0` means it will persist forever.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: ServerRespawnTime=
    label: Respawn Time
    type: number
    min: 0
    repeatable: false
    default: 45
    helpText: Amount of time (in minutes) a player must be alive before they can use
      the `/respawn` command to kill their dinosaur and respawn. It's suggested
      to keep this number relatively high to avoid players piling up corpses on
      your server and causing issues.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: ServerLogoutTime=
    label: Logout Time
    type: number
    repeatable: false
    default: 60
    helpText: Sets the time (in seconds) that players will remain logged out before
      their session is terminated.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: AFKDisconnectTime=
    label: AFK Disconnect Time
    type: number
    repeatable: false
    default: 600
    helpText: Sets the time (in seconds) that players can be away from their
      keyboard (AFK) before being disconnected from the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 6
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: SpeedhackDetection=
    label: Speedhack Detection
    type: number
    min: 0
    max: 3
    repeatable: false
    default: 1
    helpText: Setting for action taken when speed hacks are detected. `0` = none,
      `1` = log, `2` = kick, `3` = ban. From settings `1`-`3`, a PlayerHack
      webhook will also be sent.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 7
    accordionOrder: 11
  - accordion: Player Lifecycle & Security
    subheader: ""
    property: SpeedhackThreshold=
    label: Speedhack Threshold
    type: number
    min: 0
    repeatable: false
    default: 10
    helpText: Sets the threshold for speedhack detection. Higher values may result
      in more false positives.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 8
    accordionOrder: 11
  # ═══════════════════════════════════════════════════════════════
  # Character Management (2 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Character Management
    subheader: ""
    property: MaxCharactersPerPlayer=
    label: Max Characters Per Player
    type: number
    min: 1
    max: 50
    repeatable: false
    default: 30
    helpText: Sets the maximum number of characters a player can create.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 12
  - accordion: Character Management
    subheader: ""
    property: MaxCharactersPerSpecies=
    label: Max Characters Per Species
    type: number
    min: 1
    max: 50
    repeatable: false
    default: 1
    helpText: Sets the maximum number of characters a player can create per species.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 12
  # ═══════════════════════════════════════════════════════════════
  # Weather System (2 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Weather System
    subheader: ""
    property: bOverrideWeather=
    label: Override Weather
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, the server will override the weather settings.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 13
  - accordion: Weather System
    subheader: ""
    property: bRandomizeOverrideWeather=
    label: Randomize Override Weather
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, the server will randomize the weather settings.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 13
  # ═══════════════════════════════════════════════════════════════
  # Water & Environmental Systems (8 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Water & Environmental Systems
    subheader: ""
    property: bServerWaterQualitySystem=
    label: Water Quality System
    type: checkbox
    repeatable: false
    default: true
    helpText: ""
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: bOverrideWaterRegeneration=
    label: Override Water Regeneration
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the default water regeneration behavior. If set to
      false, it will use the default values.
    section: "[/Script/PathOfTitans.IGameSession]"
    dependsOn: bServerWaterQualitySystem
    order: 1
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: bEnableWaterRegeneration=
    label: Enable Water Regeneration
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables water regeneration for players. If this is
      disabled, please ensure you have water restoration quests on the map you
      are hosting, otherwise you will eventually run out of water.
    section: "[/Script/PathOfTitans.IGameSession]"
    dependsOn: bServerWaterQualitySystem
    order: 2
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: WaterRegenerationRateMultiplierUpdate=
    label: Water Regeneration Rate Multiplier
    type: number
    min: 0
    repeatable: false
    default: 180
    helpText: Multiplier for the water regeneration rate.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: WaterRegenerationRate=
    label: Water Regeneration Rate
    type: number
    min: 0
    repeatable: false
    default: 60
    helpText: Amount of time in seconds before water applies a regeneration amount.
      Setting this value too low makes the server update water more frequently
      and can cause lag.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: WaterRegenerationValue=
    label: Water Regeneration
    type: number
    min: 0
    repeatable: false
    default: 10
    helpText: Amount of water restored per regeneration tick. This scales depending
      on how large the body of water is.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 5
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: WaterRainRegenerationIncrement=
    label: Water Rain Regeneration
    type: number
    min: 0
    repeatable: false
    default: 20
    helpText: Multiplier that increases the amount of water restored when it rains.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 6
    accordionOrder: 14
  - accordion: Water & Environmental Systems
    subheader: ""
    property: bServerHungerThirstInCaves=
    label: Hunger & Thirst in Caves
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables Hunger and Thirst in Home Caves. If disabled,
      Dinosaurs will not lose hunger or thirst in Home Caves and will take no
      damage if they have no food or water.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 7
    accordionOrder: 14
  # ═══════════════════════════════════════════════════════════════
  # Network Settings (5 settings)
  # ═══════════════════════════════════════════════════════════════
  - accordion: Network Settings
    subheader: ""
    property: MaxClientPingMs=
    label: Max Client Ping (ms)
    type: number
    repeatable: false
    default: 0
    helpText: Specifies the maximum ms ping before auto-disconnecting the player.
      `0` will disable this option. Use to prevent high-ping players causing
      issues for your server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 0
    accordionOrder: 15
  - accordion: Network Settings
    subheader: ""
    property: MaxClientPingDuration=
    label: Max Client Ping Duration (ms)
    type: number
    repeatable: false
    default: 0
    helpText: Specifies the maximum duration (in milliseconds) for which a client
      can exceed the ping limit before being disconnected. `0` will disable this
      option.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 1
    accordionOrder: 15
  - accordion: Network Settings
    subheader: ""
    property: bDisableGrouping=
    label: Disable Grouping
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, players will not be grouped together in the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 15
  - accordion: Network Settings
    subheader: ""
    property: bServerCombatTimerAppliesToGroup=
    label: Server Combat Timer Applies to Group
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, the server combat timer will apply to all players in a group.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 3
    accordionOrder: 15
  - accordion: Network Settings
    subheader: ""
    property: bServerAllowChangeSubspecies=
    label: Allow Change Subspecies
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, players will be allowed to change their dinosaur's subspecies.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 15
