# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: Death # Death & Respawn Respawn
settings:
  -
    subheader: ""
    property: bPermaDeath=
    label: Permanent Death
    type: checkbox
    repeatable: false
    default: false
    helpText: "Activates permanent death on the server. Deceased characters will
      show up as corpses on the Character Selection Menu. Defaults to false.
      NOTE: This feature is not finished and may break character data for your
      server. Use at your own risk."
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bDeathInfo=
    label: Death Info
    type: checkbox
    repeatable: false
    default: false
    helpText: Displays a textbox on the Character Select Screen that provides info
      about your dead character when Permanent Death is enabled.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bDeathInfoKilledBy=
    label: Death Info Killed By
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, the death info will include the player who killed you.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: CombatDeathMarksPenaltyPercent=
    label: Combat Death Marks Penalty Percent
    type: number
    min: 0
    repeatable: false
    default: 25
    helpText: The percentage penalty applied to players who die in combat. This
      affects the number of marks lost upon death.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: FallDeathMarksPenaltyPercent=
    label: Fall Death Marks Penalty Percent
    type: number
    min: 0
    repeatable: false
    default: 5
    helpText: The percentage penalty applied to players who die from falling. This
      affects the number of marks lost upon death.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: SurvivalDeathMarksPenaltyPercent=
    label: Survival Death Marks Penalty Percent
    type: number
    min: 0
    repeatable: false
    default: 10
    helpText: The percentage penalty applied to players who die from
      survival-related causes. This affects the number of marks lost upon death.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: RevengeKillDistance=
    label: Revenge Kill Distance
    type: number
    min: 0
    repeatable: false
    default: 100000
    helpText: (`100000` = 1km) Will only work when a Database is set to remote, for
      hived servers. It is planned to work for all servers in the future.
      Specifies the radius of the Anti-Revenge Kill distance.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAntiRevengeKill=
    label: Server Anti-Revenge Kill
    type: checkbox
    repeatable: false
    default: false
    helpText: Will only work when a Database is set to remote, for hived servers. It
      is planned to work for all servers in the future. When set to `Enabled`,
      when a player is killed, any of their other characters within a certain
      radius are flagged with a 10 minute timer, which prevents those specific
      characters from logging back in right away. Characters that are further
      away are unaffected by the login timer.
    section: "[/Script/PathOfTitans.IGameSession]"
