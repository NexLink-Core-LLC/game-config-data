# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
# property       INI property name (required)
# label          Display name in panel UI (required)
# type           text | number | checkbox | select | password (required)
# default        Default value (required)
# helpText       Help description shown to the user
# section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
# subheader      Sub-group label within the section
# configType     server-variable (omit for game-ini settings)
# repeatable     true | false — can appear multiple times
# fullWidth      true | false — force full-width layout
# min            Minimum value (number type only)
# max            Maximum value (number type only)
# step           Increment step (number type only)
# options        List of allowed values (select type only)
# dependsOn      Only show when another setting is enabled
# ─────────────────────────────────────────────
name: Network Settings
settings:
  -
    subheader: ""
    property: MaxClientPingMs=
    label: Max Client Ping (ms)
    type: number
    repeatable: false
    default: 0
    helpText: Specifies the maximum ms ping before auto-disconnecting the player.
      `0` will disable this option. Use to prevent high-ping players causing
      issues for your server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: MaxClientPingDuration=
    label: Max Client Ping Duration (ms)
    type: number
    repeatable: false
    default: 0
    helpText: Specifies the maximum duration (in milliseconds) for which a client
      can exceed the ping limit before being disconnected. `0` will disable this
      option.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bDisableGrouping=
    label: Disable Grouping
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, players will not be grouped together in the server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerCombatTimerAppliesToGroup=
    label: Server Combat Timer Applies to Group
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, the server combat timer will apply to all players in a group.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllowChangeSubspecies=
    label: Allow Change Subspecies
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, players will be allowed to change their dinosaur's subspecies.
    section: "[/Script/PathOfTitans.IGameSession]"
