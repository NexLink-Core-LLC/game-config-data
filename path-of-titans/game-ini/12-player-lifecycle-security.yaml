# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: Player Lifecycle # Player Lifecycle & Security Security
settings:
  -
    subheader: ""
    property: bServerEditAbilitiesWhileSleeping=
    label: Enable Editing Abilities While Sleeping
    type: checkbox
    repeatable: false
    default: false
    helpText: If `enabled`, players can edit their abilities while sleeping. If
      disabled, players cannot edit their abilities while sleeping. If this is
      `enabled` AND `Enable Editing Abilities in Home Caves`, players can edit
      their abilities in their home caves OR while sleeping.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerHatchlingCaves=
    label: Enable Hatchling Caves
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables/Disables the tutorial Hatchling Caves. If this is enabled,
      players will spawn in a tutorial area at `0` growth, and completing quests
      will bring them to `0.25` growth by the time they exit. If this is
      disabled, players will spawn in the world at `0.25` growth and completely
      skip the tutorial. The growth can be modified with `Hatchling Cave Exit
      Growth`.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllowReplayRecording=
    label: Enable Replay Recording
    type: checkbox
    repeatable: false
    default: false
    helpText: If `enabled`, players will be able to record their gameplay and replay
      it later. If disabled, players will not be able to record their gameplay.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: ServerDeadBodyTime=
    label: Dead Body Time
    type: number
    repeatable: false
    default: 0
    helpText: Sets the time (in seconds) that dead bodies will remain in the world
      before despawning. A value of `0` means it will persist forever.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: ServerRespawnTime=
    label: Respawn Time
    type: number
    min: 0
    repeatable: false
    default: 45
    helpText: Amount of time (in minutes) a player must be alive before they can use
      the `/respawn` command to kill their dinosaur and respawn. It's suggested
      to keep this number relatively high to avoid players piling up corpses on
      your server and causing issues.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: ServerLogoutTime=
    label: Logout Time
    type: number
    repeatable: false
    default: 60
    helpText: Sets the time (in seconds) that players will remain logged out before
      their session is terminated.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: AFKDisconnectTime=
    label: AFK Disconnect Time
    type: number
    repeatable: false
    default: 600
    helpText: Sets the time (in seconds) that players can be away from their
      keyboard (AFK) before being disconnected from the server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: SpeedhackDetection=
    label: Speedhack Detection
    type: number
    min: 0
    max: 3
    repeatable: false
    default: 1
    helpText: Setting for action taken when speed hacks are detected. `0` = none,
      `1` = log, `2` = kick, `3` = ban. From settings `1`-`3`, a PlayerHack
      webhook will also be sent.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: SpeedhackThreshold=
    label: Speedhack Threshold
    type: number
    min: 0
    repeatable: false
    default: 10
    helpText: Sets the threshold for speedhack detection. Higher values may result
      in more false positives.
    section: "[/Script/PathOfTitans.IGameSession]"
