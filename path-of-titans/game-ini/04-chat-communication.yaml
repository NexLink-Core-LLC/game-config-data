name: Chat # Chat & Communication Communication
settings:
  -
    subheader: ""
    property: bServerAllowChat=
    label: Allow Chat
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables text chat for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerGlobalChat=
    label: Global Chat
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables global chat for all players on the server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerChatWhispers=
    label: Chat Whispers
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables whisper chat for players on the server.
    section: "[/Script/PathOfTitans.IGameSession]"
