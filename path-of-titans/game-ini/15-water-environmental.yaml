# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: Water # Water & Environmental Systems Environmental Systems
settings:
  -
    property: bServerWaterQualitySystem=
    label: Water Quality System
    type: checkbox
    repeatable: false
    default: true
    helpText: "Enables or disables the water quality system."
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    property: bOverrideWaterRegeneration=
    label: Override Water Regeneration
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the default water regeneration behavior. If set to
      false, it will use the default values.
    section: "[/Script/PathOfTitans.IGameSession]"
    dependsOn: bServerWaterQualitySystem
  -
    subheader: ""
    property: bEnableWaterRegeneration=
    label: Enable Water Regeneration
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables water regeneration for players. If this is
      disabled, please ensure you have water restoration quests on the map you
      are hosting, otherwise you will eventually run out of water.
    section: "[/Script/PathOfTitans.IGameSession]"
    dependsOn: bServerWaterQualitySystem
  -
    subheader: ""
    property: WaterRegenerationRateMultiplierUpdate=
    label: Water Regeneration Rate Multiplier
    type: number
    min: 0
    repeatable: false
    default: 180
    helpText: Multiplier for the water regeneration rate.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: WaterRegenerationRate=
    label: Water Regeneration Rate
    type: number
    min: 0
    repeatable: false
    default: 60
    helpText: Amount of time in seconds before water applies a regeneration amount.
      Setting this value too low makes the server update water more frequently
      and can cause lag.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: WaterRegenerationValue=
    label: Water Regeneration
    type: number
    min: 0
    repeatable: false
    default: 10
    helpText: Amount of water restored per regeneration tick. This scales depending
      on how large the body of water is.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: WaterRainRegenerationIncrement=
    label: Water Rain Regeneration
    type: number
    min: 0
    repeatable: false
    default: 20
    helpText: Multiplier that increases the amount of water restored when it rains.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerHungerThirstInCaves=
    label: Hunger & Thirst in Caves
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables Hunger and Thirst in Home Caves. If disabled,
      Dinosaurs will not lose hunger or thirst in Home Caves and will take no
      damage if they have no food or water.
    section: "[/Script/PathOfTitans.IGameSession]"
