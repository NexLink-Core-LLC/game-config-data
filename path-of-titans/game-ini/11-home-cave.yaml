# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: Home Cave
settings:
  -
    subheader: ""
    property: bServerHomeCaves=
    label: Enable Home Caves
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables home caves on your server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerHomecaveCampingDebuff=
    label: Home Cave Camping Debuff
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, players will receive a debuff when camping at a home cave.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bOverrideHomecaveCampingDistance=
    label: Override Home Cave Camping Distance
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, this will override the default camping distance for home caves.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: HomecaveCampingDistance=
    label: Home Cave Camping Distance
    type: number
    repeatable: false
    default: 20000
    helpText: The distance players must be from the home cave to avoid the camping
      debuff. `20000`, which is 200 meters.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bOverrideHomecaveCampingDelay=
    label: Override Home Cave Camping Delay
    type: checkbox
    repeatable: false
    default: false
    helpText: Flags whether there is a delay between a player entering the `Home
      Cave Camping Delay` radius, and actually having the debuff applied to
      them. Typically this should be at least a few minutes to avoid players
      instantly getting debuffed when they walk near a Home Cave.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: HomecaveCampingDelay=
    label: Home Cave Camping Delay
    type: number
    repeatable: false
    default: 180
    helpText: Time (in seconds) the Home Cave Camping debuff will delay before being
      applied to a player if they are within the HomecaveCampingDistance.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerEditAbilitiesInHomeCaves=
    label: Enable Editing Abilities in Home Caves
    type: checkbox
    repeatable: false
    default: true
    helpText: If `enabled`, players can only edit abilities in their home caves. If
      disabled, players can edit their abilities anywhere. Recommended to be set
      to `enabled` if you also enable home caves on your server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerHealingInHomeCave=
    label: Enable Healing in Home Caves
    type: checkbox
    repeatable: false
    default: true
    helpText: If `enabled`, players will be able to heal while inside home caves. If
      disabled, players will not be able to heal in home caves.
    section: "[/Script/PathOfTitans.IGameSession]"
