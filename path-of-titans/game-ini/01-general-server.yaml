# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: General Server Settings
settings:

  - property: SERVER_NAME
    configType: server-variable
    label: Server Name
    type: text
    default: Hosted by NexLink Core
    helpText: Sets the name for the server
    fullWidth: false

  - property: ServerMap
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Server Map
    default: Panjura
    helpText: The map the server will load with.
    type: select
    options:
      - Island
      - Panjura
      - Riparia

  - property: SLOTS
    configType: server-variable
    label: Player Slots
    type: number
    default: ""
    helpText: Max player slots on the server
    step: 1
    min: 1
    max: 200
    fullWidth: false

  - property: ReservedSlots=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Reserved Slots
    type: number
    step: 1
    min: 0
    max: 60
    repeatable: false
    default: 20
    helpText: Number of reserved player slots
    fullWidth: false

  - property: DISCORD
    configType: server-variable
    label: Server Discord
    type: text
    default: nlcore
    helpText: Add your Discord link so players can connect to your Discord server!

  - property: SERVER_PASSWORD
    configType: server-variable
    label: Server Password
    type: password
    default: ""
    helpText: Sets a password to enter the server. Leave blank for no password.

  - property: RCON_PASSWORD
    configType: server-variable
    label: RCON Password
    type: password
    default: ""
    helpText: Sets a password for RCON access. RCON allows remote administration of the server. Make sure to use a strong password to prevent unauthorized access. Must be at least 8 characters long.
    fullWidth: false

  - property: bServerNameTags=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Name Tags
    type: checkbox
    repeatable: false
    default: ""
    helpText: Enables or disables the ability for ALL players on the server to see player nametags.

  - property: bServerFallDamage=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Fall Damage
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables fall damage for players.

  - property: bServerAllowAnselMultiplayerPausing=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Allow Ansel Multiplayer Pausing
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables the ability to pause the game while using Ansel in
      multiplayer. Be mindful of allowing this, as players can technically use
      it to pause their game to investigate the location of hiding players or
      gain other gameplay advantages.

  - property: ServerAnselCameraConstraintDistance=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Ansel Camera Constraint Distance
    type: number
    min: 0
    repeatable: false
    default: 500
    helpText: The distance, in centimeters, the player can move their Nvidia Ansel
      camera away from their dinosaur in order to take screenshots. It's
      suggested to keep this a bit limited to avoid unfair gameplay advantages.
      Defaults to `500` (5 meters).
    dependsOn: bServerAllowAnselMultiplayerPausing=

  - property: bServerDynamicTimeOfDay=
    subheader: Time of Day
    section: "[/Script/PathOfTitans.IGameMode]"
    label: Dynamic Time of Day
    type: checkbox
    repeatable: false
    default: true
    helpText: If enabled, the world time cycles automatically between day and night.
    fullWidth: true

  - property: ServerDayLength=
    subheader: Time of Day
    section: "[/Script/PathOfTitans.IGameMode]"
    label: Day Length
    type: number
    min: 1
    repeatable: false
    default: 60
    helpText: Length of the daylight period (units as per game config; higher =
      longer days).
    dependsOn: bServerDynamicTimeOfDay

  - property: ServerNightLength=
    subheader: Time of Day
    section: "[/Script/PathOfTitans.IGameMode]"
    label: Night Length
    type: number
    min: 1
    repeatable: false
    default: 30
    helpText: Length of the nighttime period (units as per game config; higher = longer nights).
    dependsOn: bServerDynamicTimeOfDay
    
  - property: ServerStartingTime=
    section: "[/Script/PathOfTitans.IGameMode]"
    subheader: Time of Day
    label: Server Starting Time
    type: number
    min: 0
    max: 2300
    repeatable: false
    default: 1300
    helpText: Specifies the time of day the server begins at after a restart. Time
      is scaled between 0-2300. Example:100 = 1:00 AM, 1200 = 12:00 PM, and 1800
      = 6:00 PM signifies 12:00 PM, and 1800 denotes 6:00 PM.

  - property: ServerFootprintLifetime=
    section: "[/Script/PathOfTitans.IGameSession]"
    label: Footprint Lifetime
    type: number
    min: 0
    max: 60
    repeatable: false
    default: 60
    helpText: The duration (in seconds) that a server footprint remains active after
      a player leaves.

  - property: DefaultCreatorModeSave=
    section: "[/Script/PathOfTitans.IGameMode]"
    label: Default Creator Mode Save
    type: text
    default: ""
    helpText: The default save slot used for Creator Mode when no save is specified. This should be the name of an existing save file on the server. This is case sensitive and must match the name of a save file in the Creator Mode saves directory. Example: "MyCreatorModeSave". If left blank, Creator Mode will require players to select a save slot each time they enter Creator Mode.
