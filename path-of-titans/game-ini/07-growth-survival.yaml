# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property       INI property name (e.g. bServerGrowth=)
#   label          Display name shown in the panel UI
#   type           Input type (see Input Types below)
#   default        Default value when the setting is not set
#
# OPTIONAL FIELDS:
#   helpText       Help description shown to the user
#   section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
#   subheader      Sub-group label within the section
#   configType     Set to "server-variable" for Pterodactyl startup variables
#                  (omit for Game.ini settings)
#   repeatable     true | false — can this setting appear multiple times
#   fullWidth      true | false — force the field to take the full row
#   min            Minimum allowed value (number type only)
#   max            Maximum allowed value (number type only)
#   step           Increment step size (number type only, e.g. 1 for whole numbers)
#   options        List of allowed values (select type only)
#   dependsOn      Only show this setting when another setting is enabled
#                  (use the property name, e.g. dependsOn: bServerDynamicTimeOfDay)
#
# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────
#
#   text       A free-text input field. The user can type anything.
#              Example: Server name, Discord invite code
#
#   number     A numeric input with optional min/max/step constraints.
#              Use "min" and "max" to set allowed range.
#              Use "step" to control increment (e.g. step: 1 for integers,
#              step: 0.01 for decimals).
#              Example: Player slots, cooldown timers, growth multipliers
#
#   checkbox   A toggle switch (true/false). Shows as a checkbox in the UI.
#              Default should be true or false.
#              Example: Enable/disable features like fall damage, chat, nesting
#
#   select     A dropdown menu with predefined choices. Requires an "options"
#              list with all allowed values. The user picks one.
#              Example: Server map selection (Island, Panjura, Riparia)
#
#   password   A text field that hides the input (shown as dots).
#              Used for sensitive values like passwords.
#              Example: Server password, RCON password
#
# ─────────────────────────────────────────────
name: Growth # Growth & Survival Survival
settings:
  -
    subheader: ""
    property: bServerGrowth=
    label: Enable Growth
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the growth system. If disabled, all dinosaurs will
      spawn as Adults, and all existing characters will be bumped up to Adult.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: MinGrowthAfterDeath=
    label: Minimum Growth After Death
    type: number
    min: 0
    max: 1
    repeatable: false
    default: 0.5
    helpText: Sets the minimum growth stage a dinosaur will revert to after death.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: GlobalPassiveGrowthPerMinute=
    label: Global Passive Growth Per Minute
    type: number
    repeatable: false
    default: 0
    helpText: Sets the global passive growth rate for all dinosaurs. use
      (https://guides.gsh-servers.com/path-of-titans/tools/path-of-titans-growth-calculator)
      to calculate appropriate values.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bLoseGrowthPastGrowthStages=
    label: Lose Growth Past Growth Stages
    type: checkbox
    repeatable: false
    default: true
    helpText: Allows players to lose growth past Juvenile/Adolescent/Sub-Adult/Adult
      growth states when they die.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: ChangeSubspeciesGrowthPenaltyPercent=
    label: Change Subspecies Growth Penalty Percent
    type: number
    repeatable: false
    default: 25
    helpText: Specifies the growth penalty percent for changing subspecies. Note
      that `Lose Growth Past Growth Stages` may have to be active for anything
      25 and above.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: CombatDeathGrowthPenaltyPercent=
    label: Combat Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 10
    helpText: Specifies the growth penalty percent for combat deaths. Note that
      `Lose Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: FallDeathGrowthPenaltyPercent=
    label: Fall Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 2
    helpText: Specifies the growth penalty percent for fall deaths. Note that `Lose
      Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: SurvivalDeathGrowthPenaltyPercent=
    label: Survival Death Growth Penalty Percent
    type: number
    repeatable: false
    default: 5
    helpText: Specifies the growth penalty percent for survival deaths. Note that
      `Lose Growth Past Growth Stages` may have to be active for anything 25 and
      above.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: HatchlingCaveExitGrowth=
    label: Hatchling Cave Exit Growth
    type: number
    min: 0
    max: 1
    repeatable: false
    default: 0
    helpText: Specifies the growth a player will have when they exit the Hatchling
      Caves. `0` denotes a hatchling and is the default value.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bUseTutorialCustomGrowthMultiplier=
    label: Use Tutorial Custom Growth Multiplier
    type: checkbox
    repeatable: false
    default: false
    helpText: If true, the tutorial will use the `Tutorial Growth Multiplier` value
      to determine the growth rate of the player. If `false`, the tutorial will
      use the default growth rate.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: TutorialCustomGrowthMultiplier=
    label: Tutorial Growth Multiplier
    type: number
    repeatable: false
    default: 1
    helpText: Specifies the custom growth multiplier for the tutorial.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerWellRestedBuff=
    label: Server Well Rested Buff
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the Well Rested buff.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerFish=
    label: Enable Fish
    type: checkbox
    repeatable: false
    default: false
    helpText: Enables or disables fish spawning.
    section: "[/Script/PathOfTitans.IGameSession]"
  # --- Grouping Rules ---
  -
    subheader: Grouping Rules
    property: bServerRestrictCarnivoreGrouping=
    label: Restrict Carnivore Grouping
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, limits or disallows grouping rules for carnivores to curb
      large-pack advantages.
    section: "[/Script/PathOfTitans.IGameMode]"
  -
    subheader: Grouping Rules
    property: bServerRestrictHerbivoreGrouping=
    label: Restrict Herbivore Grouping
    type: checkbox
    repeatable: false
    default: false
    helpText: If enabled, limits or disallows grouping rules for herbivores to
      reduce herd-size advantages.
    section: "[/Script/PathOfTitans.IGameMode]"
  -
    subheader: Grouping Rules
    property: MaxGroupSize=
    label: Max Group Size
    type: number
    min: 1
    max: 50
    repeatable: false
    default: 10
    helpText: Maximum number of players allowed per group.
    section: "[/Script/PathOfTitans.IGameMode]"
    step: 1
  -
    subheader: Grouping Rules
    property: MaxGroupLeaderCommunicationDistance=
    label: Group Leader Comm Distance
    type: number
    min: 0
    repeatable: false
    default: 50000
    helpText: Maximum distance (game units) that group leader communications/markers
      are shared. Increase to allow farther coordination.
    section: "[/Script/PathOfTitans.IGameMode]"
