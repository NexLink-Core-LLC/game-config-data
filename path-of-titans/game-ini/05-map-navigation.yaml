# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
# property       INI property name (required)
# label          Display name in panel UI (required)
# type           text | number | checkbox | select | password (required)
# default        Default value (required)
# helpText       Help description shown to the user
# section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
# subheader      Sub-group label within the section
# configType     server-variable (omit for game-ini settings)
# repeatable     true | false — can appear multiple times
# fullWidth      true | false — force full-width layout
# min            Minimum value (number type only)
# max            Maximum value (number type only)
# step           Increment step (number type only)
# options        List of allowed values (select type only)
# dependsOn      Only show when another setting is enabled
# ─────────────────────────────────────────────
name: Map # Map & Navigation Navigation
settings:
  -
    subheader: ""
    property: bServerAllowMap=
    label: Allow Map
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the full map for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllowMinimap=
    label: Allow Minimap
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the minimap for the entire server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllow3DMapMarkers=
    label: Allow 3D Map Markers
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the markers on the full map, and floating quest
      markers in the world.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllowMapPOINames=
    label: Allow Map POI Names
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the display of Point of Interest names on the map.
    section: "[/Script/PathOfTitans.IGameSession]"
  # --- Popular Locations ---
  -
    subheader: Popular Locations
    property: bServerShowMapIconPopularLocation=
    label: Show Map Icon for Popular Locations
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables Popular Locations, highlighting areas of the map with a high
      player density.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: Popular Locations
    property: ServerMapIconPopularLocationPlayerCount=
    label: Popular Location Player Count
    type: number
    repeatable: false
    default: 10
    helpText: Allows you to set the number of users required in an area before it's
      highlighted on the map.
    section: "[/Script/PathOfTitans.IGameSession]"
  # --- Spawns ---
  -
    subheader: Spawns
    property: FurthestSpawnInclusionRadius=
    label: Furthest Spawn Inclusion Radius
    type: number
    min: 0
    repeatable: false
    default: 100000
    helpText: Max radius (game units; e.g., 100000 ≈ 1km) within which spawn points
      are considered for new/respawning players.
    section: "[/Script/PathOfTitans.IGameMode]"
