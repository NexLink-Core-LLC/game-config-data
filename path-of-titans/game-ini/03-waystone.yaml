# ─────────────────────────────────────────────
# Field Reference
# ─────────────────────────────────────────────
# property       INI property name (required)
# label          Display name in panel UI (required)
# type           text | number | checkbox | select | password (required)
# default        Default value (required)
# helpText       Help description shown to the user
# section        INI file section e.g. "[/Script/PathOfTitans.IGameSession]"
# subheader      Sub-group label within the section
# configType     server-variable (omit for game-ini settings)
# repeatable     true | false — can appear multiple times
# fullWidth      true | false — force full-width layout
# min            Minimum value (number type only)
# max            Maximum value (number type only)
# step           Increment step (number type only)
# options        List of allowed values (select type only)
# dependsOn      Only show when another setting is enabled
# ─────────────────────────────────────────────
name: Waystone Settings
settings:
  -
    subheader: ""
    property: bServerWaystones=
    label: Enable Waystones
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables Waystones on your server.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerAllowInGameWaystone=
    label: Allow In-Game Waystone
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables waystones. Setting this as false requires players
      to use the old method of using the Waystone by retuning to the Character
      Menu screen.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: bServerWaystoneCooldownRemoval=
    label: Remove Waystone Cooldown
    type: checkbox
    repeatable: false
    default: true
    helpText: Enables or disables the ability for players to spend marks to
      insta-cooldown Waystones.
    section: "[/Script/PathOfTitans.IGameSession]"
  -
    subheader: ""
    property: OverrideWaystoneCooldown=
    label: Override Waystone Cooldown
    type: number
    min: -1
    repeatable: false
    default: -1
    helpText: Overrides the cooldown timer for Waystones in seconds. -1 will use the
      default cooldown timer.
    section: "[/Script/PathOfTitans.IGameSession]"
