# ═══════════════════════════════════════════════════════════════
# Path of Titans — Server Variables Schema
# ═══════════════════════════════════════════════════════════════
# These are Pterodactyl startup variables (not Game.ini settings).
# They configure the server environment before the game launches.
#
# ───────────────────────────────────────────────────────────────
# Field Legend
# ───────────────────────────────────────────────────────────────
#
# REQUIRED FIELDS:
#   property        Variable name (e.g. SERVER_NAME, SLOTS)
#   label           Display name shown in the panel UI
#   type            Input type — one of:
#                     text      Free-text input
#                     number    Numeric input (use step to set increment)
#   default         Default value
#   accordion       UI group name
#   accordionOrder  Display order of the group (0 = first)
#   order           Display order within the group (0 = first)
#
# OPTIONAL FIELDS:
#   helptext        Help description shown to the user
#   step            Increment step (number type only)
#   fullWidth       Force full-width layout in UI (true/false)
#   repeatable      Can appear multiple times (true/false)
#   section         INI section (if applicable)
#
# ═══════════════════════════════════════════════════════════════
# Total: 4 variables
# ═══════════════════════════════════════════════════════════════

serverVariables:
  - accordion: General Server Settings
    property: SERVER_NAME
    label: Server Name
    type: text
    default: Hosted by GSH
    helptext: Sets the name for the server
    order: 0
    accordionOrder: 0
    fullWidth: true
  - property: SLOTS
    label: Player Slots
    type: number
    default: ""
    helptext: Max player slots on the server
    accordion: General Server Settings
    step: 1
    order: 1
    accordionOrder: 0
    fullWidth: false
  - accordion: General Server Settings
    subheader: ""
    property: SERVER_PASSWORD
    label: Server Password
    type: text
    repeatable: false
    default: ""
    helpText: Sets a password to enter the server.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 2
    accordionOrder: 0
    helptext: Sets a password to enter the server.
  - accordion: General Server Settings
    subheader: ""
    property: DISCORD
    label: Server Discord
    type: text
    repeatable: false
    default: gsh
    helpText: Specifies the connected community Discord server. This must be only
      the letters/numbers after the discord.gg part of the server invite link.
    section: "[/Script/PathOfTitans.IGameSession]"
    order: 4
    accordionOrder: 0
    helptext: Add your Discord link so players can connect to your Discord server!
  - accordion: General Server Settings
    property: RCON_PASSWORD
    label: RCON Password
    type: text
    default: "default"
    helpText: You must generate a unique/complex password using a password generator tool like https://1password.com/password-generator this protects your servers from any hacking attempts!
    order: 6
    accordionOrder: 0
    fullWidth: true
